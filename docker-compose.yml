services:
  zox-push:
    build: ./backend
    container_name: zox-push
    ports:
      - "38127:38127"
    environment:
      DEFAULT_TOUSER: "${DEFAULT_TOUSER:-@all}"
      PORT: "${PORT:-38127}"
      DATA_DIR: /data
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
    volumes:
      - ./data:/data
    restart: unless-stopped
